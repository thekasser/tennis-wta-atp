name: Tennis Dashboard Refresh

on:
  schedule:
    - cron: '0 6 * * *'  # 10pm PST (6am UTC)
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Seed the cache from the most recent prior run. The exact key uses run_id
      # (unique per run) so it never hits — forcing a fresh save every time.
      # restore-keys falls back to any prior cache, which api_client.py's 6h TTL
      # then selectively invalidates: files older than 6h get refetched, recent
      # ones are served from disk. This prevents the run_number pattern where
      # run N restores run N-1's cache and serves everything as a cache hit.
      - name: Restore API cache
        uses: actions/cache@v4
        with:
          path: scripts/cache
          key: tennis-api-cache-${{ github.run_id }}
          restore-keys: tennis-api-cache-

      # ── Step 1: Rankings (~4 API calls) ──────────────────────────────────
      - name: Step 1 — Rankings refresh
        env:
          MATCHSTAT_API_KEY: ${{ secrets.MATCHSTAT_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/refresh_rankings_api.py --tour both

      # ── Step 2: Match stats (~240 API calls, mostly cache hits) ──────────
      - name: Step 2 — Match stats fetch
        env:
          MATCHSTAT_API_KEY: ${{ secrets.MATCHSTAT_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/fetch_match_stats_api.py --tour both --years 2026

      # ── Step 3: Trapezoid merge (no API calls) ────────────────────────────
      # 2024 Sackmann aggregates live only on Connor's Mac; omit that year here.
      # The existing trapezoid_data.js already has 2024 data baked in from the
      # last local run — this step updates only the 2025/2026 aggregates.
      - name: Step 3 — Trapezoid merge
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/write_trapezoid_from_json.py --years 2025 2026

      # ── H2H rebuild (no API calls) ────────────────────────────────────────
      - name: H2H rebuild
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/build_h2h.py

      # ── Commit & push → triggers Cloudflare Pages auto-deploy ─────────────
      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes — skipping commit" || \
            git commit -m "chore: data refresh $(date +%Y-%m-%d)" && git push
