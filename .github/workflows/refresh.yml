name: Tennis Dashboard Refresh

on:
  schedule:
    # 6× per day at 4-hour intervals — keeps active-tournament status fresh
    # within ~30 min of cron + match completion. ~50–100 API calls/day total
    # (incremental sync only refetches recently-active players).
    - cron: '0 */4 * * *'
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      # Prevent two scheduled runs from racing on git push.
      group: refresh
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Restore the SQLite DB from the committed snapshot ──────────────
      - name: Restore DB snapshot
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/restore_db.py

      # ── Sync rankings (~4 API calls) ───────────────────────────────────
      - name: Sync rankings
        env:
          MATCHSTAT_API_KEY: ${{ secrets.MATCHSTAT_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/sync_rankings.py --tour both

      # ── Sync matches (~30–50 API calls during active tournaments) ──────
      # Smart heuristic in sync_matches skips players who haven't moved
      # since last fetch. Active-tournament players get refetched every run.
      - name: Sync matches
        env:
          MATCHSTAT_API_KEY: ${{ secrets.MATCHSTAT_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/sync_matches.py --tour both --years 2025 2026

      # ── Materialize all data/*.js files from the DB ────────────────────
      # Hash-based change detection means files only rewrite if data changed.
      - name: Materialize data files
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/materialize.py

      # ── Update the committed DB snapshot ───────────────────────────────
      - name: Snapshot DB
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/snapshot_db.py

      # ── Pre-commit sanity gate ─────────────────────────────────────────
      - name: Validate DB
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 scripts/validate.py

      # ── Commit & push → triggers Cloudflare Pages auto-deploy ──────────
      - name: Commit and push
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No data changes — skipping commit" || \
            (git commit -m "chore: data refresh $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
